# BullWave Capital — full stack (PostgreSQL + API + Flutter Web + Ollama)
#
# Quick start:
#   1. copy .env.docker.example .env
#   2. Edit .env — set KOTAK_NEO_ACCESS_TOKEN
#   3. docker compose up --build
#   4. Open http://localhost:8080  (app)  |  http://localhost:8000/admin/  (Django admin)
#
# First run downloads Ollama model (~1.3 GB) — may take several minutes.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-bullwave_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-bullwave_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for Ollama..."
        sleep 8
        echo "Pulling $${OLLAMA_MODEL:-llama3.2:1b} (first run may take a few minutes)..."
        ollama pull $${OLLAMA_MODEL:-llama3.2:1b}
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ./bullwavecapital
      dockerfile: Dockerfile
      args:
        API_BASE_URL: http://127.0.0.1:8000/api/v1
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_media:
  ollama_data:
